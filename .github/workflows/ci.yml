name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  checks:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEBUG: "True"
      GITLEAKS_VERSION: "8.30.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP" gitleaks
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Secret scan
        run: |
          # Scan only git-tracked files (skips .venv, node_modules, etc.).
          scan_dir="$(mktemp -d)"
          git ls-files -z | rsync --files-from=- --from0 -a ./ "$scan_dir"/
          gitleaks dir "$scan_dir" --config .gitleaks.toml --redact --verbose

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Ruff
        run: ruff check .

      - name: Import contracts
        run: lint-imports

      - name: Security patterns
        run: python3 tools/check_security_patterns.py

      - name: Semgrep SAST
        run: |
          semgrep scan \
            --config p/ci \
            --error \
            --metrics=off \
            config web static/web/ts tools .github

      - name: Python dependency audit
        run: python -m pip_audit

      - name: Node dependency audit
        run: npm audit --audit-level=moderate

      - name: Memory system
        run: python3 tools/check_memory_system.py

      - name: Django tests
        run: python3 manage.py test web

      - name: TypeScript
        run: npm run typecheck

      - name: Build JavaScript assets
        run: npm run build:js

      - name: Generated assets are current
        run: git diff --exit-code -- static/web/js
